name = "python-fastmcp-env-leak"
language = "python"
source_dir = "fixtures/python_fastmcp_env_leak"
entrypoint = "server.py"
capabilities = ["env", "stdio", "mcp-protocol"]

[build]
command = "bash"
args = ["-c", "python3 -m venv .venv && .venv/bin/pip install -r requirements.txt -q --disable-pip-version-check"]

[run]
command = ".venv/bin/python"
args = ["-u", "server.py"]

[mcp]
tool = "get_status"
arguments = {}
