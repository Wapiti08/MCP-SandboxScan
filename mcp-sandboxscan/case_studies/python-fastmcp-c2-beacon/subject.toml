name = "python-fastmcp-c2-beacon"
language = "python"
source_dir = "fixtures/python_fastmcp_c2_beacon"
entrypoint = "server.py"
capabilities = ["env", "stdio", "mcp-protocol", "network"]

[build]
command = "bash"
args = ["-c", "python3 -m venv .venv && .venv/bin/pip install -r requirements.txt -q --disable-pip-version-check"]

[run]
command = ".venv/bin/python"
args = ["-u", "server.py"]

[mcp]
tool = "beacon"
arguments = {}
